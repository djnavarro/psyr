on:
  workflow_dispatch:
  push:
    branches: [main]

name: Render and publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # Cache the installed R library, keyed on OS/R version/package
          # list, so repeat runs skip reinstalling/recompiling ~30
          # packages (several of which build from source). Bump
          # cache-version to force a fresh cache if it ever gets stale.
          cache: true
          cache-version: 1
          packages: |
            any::tidyverse
            any::rmarkdown
            any::knitr
            any::devtools
            any::usethis
            any::janitor
            any::BayesFactor
            any::cowplot
            any::broom
            any::gapminder
            any::gganimate
            any::gifski
            any::haven
            any::leaflet
            any::lsr
            any::car
            any::psych
            any::skimr
            any::HistData
            any::shiny
            any::shinyjs
            any::rgl
            any::mvtnorm
            any::magrittr
            any::janeaustenr
            any::here
            any::rvest
            djnavarro/TurtleGraphics
            hadley/emo

      - name: Render and publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
