on:
  workflow_dispatch:
  push:
    branches: [main]

name: Render and publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Cache and install system libraries
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          # System requirements pak would otherwise apt-get install itself
          # (mostly for sf/terra/units/rgl). Pre-installing from a cache
          # here means pak's own system-requirements check finds them
          # already satisfied and skips its (uncached) apt-get install.
          packages: >-
            cmake make libuv1-dev libicu-dev libx11-dev
            libcurl4-openssl-dev libssl-dev zlib1g-dev libfreetype6-dev
            libjpeg-dev libpng-dev libtiff-dev libwebp-dev
            libfontconfig1-dev libfribidi-dev libharfbuzz-dev libxml2-dev
            libgit2-dev pari-gp libabsl-dev libgdal-dev gdal-bin
            libgeos-dev libproj-dev libsqlite3-dev libudunits2-dev
            libglu1-mesa-dev libgl1-mesa-dev texlive
          version: 1.0

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # Cache the installed R library, keyed on OS/R version/package
          # list, so repeat runs skip reinstalling/recompiling ~30
          # packages (several of which build from source). Bump
          # cache-version to force a fresh cache if it ever gets stale.
          cache: true
          cache-version: 1
          packages: |
            any::tidyverse
            any::rmarkdown
            any::knitr
            any::devtools
            any::usethis
            any::janitor
            any::BayesFactor
            any::cowplot
            any::broom
            any::gapminder
            any::gganimate
            any::gifski
            any::haven
            any::leaflet
            any::lsr
            any::car
            any::psych
            any::skimr
            any::HistData
            any::shiny
            any::shinyjs
            any::rgl
            any::mvtnorm
            any::magrittr
            any::janeaustenr
            any::here
            any::rvest
            djnavarro/TurtleGraphics
            hadley/emo

      - name: Render and publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
